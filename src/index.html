<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanMarket</title>

    <link rel="shortcut icon" href="../public/favicon.ico" type="image/x-icon" />
    <link rel="icon" type="image/png" href="../public/favicon.png" />
    <link rel="stylesheet" href="./styles/styles.css" />

    <script defer type="module" src="./scripts/script.js"></script>
  </head>
  <body>
    <header>
      <div class="top-header-mask">
        <div class="top-header">
          <p class="sale-text">Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%!<a href="#" class="shop-now-link">ShopNow</a></p>

          <select name="languages" id="language-select">
            <option value="english">English</option>
            <option value="georgia">Georgian</option>
          </select>
        </div>
      </div>

      <div class="main-header padding-x">
        <h1>Exclusive</h1>
        <nav>
          <ul class="header-menu__list">
            <li class="header-menu__item">Home</li>
            <li class="header-menu__item">Contact</li>
            <li class="header-menu__item">About</li>
            <li class="header-menu__item header-menu__item--signup">Sign Up</li>
          </ul>
        </nav>

        <div class="header__account">
          <div class="header__search">
            <input class="header__search-input" type="search" id="search" placeholder="What are you looking for?" />
            <label class="header__search-label" for="search"><img src="./assets/icons/search.svg" alt="search icon" /></label>
          </div>
          <img class="header__wishlist" src="./assets/icons/Wishlist.svg" alt="wishlist icon" />
          <img class="header__cart" src="./assets/icons/Cart1.svg" alt="cart icon" />
        </div>
      </div>
    </header>
  </body>
</html>
